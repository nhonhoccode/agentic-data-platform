x-common-env: &common-env
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_DB: ${POSTGRES_DB:-olist}
  POSTGRES_USER: ${POSTGRES_USER:-olist}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-olist}
  POSTGRES_READONLY_USER: ${POSTGRES_READONLY_USER:-olist_ro}
  POSTGRES_READONLY_PASSWORD: ${POSTGRES_READONLY_PASSWORD:-olist_ro}
  DB_POOL_MIN_SIZE: ${DB_POOL_MIN_SIZE:-1}
  DB_POOL_MAX_SIZE: ${DB_POOL_MAX_SIZE:-8}
  DB_ENFORCE_READONLY_ROLE: ${DB_ENFORCE_READONLY_ROLE:-true}
  APP_API_KEY: ${APP_API_KEY:-change-me}
  LLM_PROVIDER: ${LLM_PROVIDER:-none}
  LLM_ENABLE_THINKING: ${LLM_ENABLE_THINKING:-false}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
  MODEL_API_BASE: ${MODEL_API_BASE:-}
  TEMPERATURE: ${TEMPERATURE:-0}
  BASE_URL: ${BASE_URL:-}
  LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
  LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
  LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-olist-ai-platform}
  LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
  QDRANT_HOST: ${QDRANT_HOST:-qdrant}
  QDRANT_PORT: ${QDRANT_PORT:-6333}
  QDRANT_API_KEY: ${QDRANT_API_KEY:-}
  QDRANT_COLLECTION_SCHEMA: ${QDRANT_COLLECTION_SCHEMA:-schema_metadata}
  QDRANT_COLLECTION_GLOSSARY: ${QDRANT_COLLECTION_GLOSSARY:-business_terms}
  EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-none}
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-m3}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
  OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-3.5-sonnet}

services:
  postgres:
    image: postgres:16
    container_name: olist-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-olist}
      POSTGRES_USER: ${POSTGRES_USER:-olist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-olist}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U olist -d olist"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/source_init.sql:/docker-entrypoint-initdb.d/source_init.sql:ro

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: olist-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      # If QDRANT_API_KEY is set in .env, auth is enforced.
      # To disable auth entirely: comment out QDRANT_API_KEY in .env (do not leave empty).
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:?QDRANT_API_KEY must be set or commented out in .env}
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  bootstrap:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: olist-bootstrap
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      DATA_DIR: /opt/project/data
    volumes:
      - ./:/opt/project
    command: bash /opt/project/scripts/bootstrap_data.sh
    restart: "no"

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: olist-api
    depends_on:
      postgres:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
      qdrant:
        condition: service_healthy
    environment:
      <<: *common-env
      DATA_DIR: /opt/project/data
      APP_PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - ./:/opt/project

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: olist-cloudflared
    depends_on:
      api:
        condition: service_started
    dns:
      - 1.1.1.1
      - 8.8.8.8
    # Default: quick tunnel (auto *.trycloudflare.com).
    # For production-like public exposure, bind named routes and enforce Cloudflare Access policies.
    command: ${CLOUDFLARED_COMMAND:-tunnel --no-autoupdate --url http://api:8000}
    restart: unless-stopped

  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: olist-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/project/airflow/dags
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-olist}:${POSTGRES_PASSWORD:-olist}@postgres:5432/${POSTGRES_DB:-olist}
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-admin}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
      AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL:-admin@example.com}
    volumes:
      - ./:/opt/project
      - airflow_logs:/opt/airflow/logs
    command: >
      bash -c "airflow db migrate &&
      airflow users create --role Admin --username \"$${AIRFLOW_ADMIN_USERNAME}\" --password \"$${AIRFLOW_ADMIN_PASSWORD}\" --firstname Admin --lastname User --email \"$${AIRFLOW_ADMIN_EMAIL}\" || true"

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: olist-airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/project/airflow/dags
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-olist}:${POSTGRES_PASSWORD:-olist}@postgres:5432/${POSTGRES_DB:-olist}
      AIRFLOW_HOME: /opt/airflow
    ports:
      - "8080:8080"
    volumes:
      - ./:/opt/project
      - airflow_logs:/opt/airflow/logs
    command: webserver

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: olist-airflow-scheduler
    depends_on:
      airflow-webserver:
        condition: service_started
    environment:
      <<: *common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/project/airflow/dags
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-olist}:${POSTGRES_PASSWORD:-olist}@postgres:5432/${POSTGRES_DB:-olist}
      AIRFLOW_HOME: /opt/airflow
    volumes:
      - ./:/opt/project
      - airflow_logs:/opt/airflow/logs
    command: scheduler

volumes:
  pg_data:
  airflow_logs:
  qdrant_data:
